name: terraform-plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  id-token: write # assume the AWS role via OIDC
  contents: read
  pull-requests: write # post the plan as a comment

concurrency:
  group: tf-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      # --- No-AWS feedback first: format + validate work without credentials ---
      - name: fmt check
        run: terraform -chdir=terraform fmt -recursive -check

      - name: validate (no backend)
        run: |
          terraform -chdir=terraform/envs/${{ matrix.env }} init -backend=false -input=false
          terraform -chdir=terraform/envs/${{ matrix.env }} validate

      - name: generate tfvars from config
        run: python3 scripts/bootstrap.py ${{ matrix.env }} --generate-only

      # --- Real plan needs AWS. Requires the OIDC bootstrap + repo var AWS_ROLE_ARN ---
      - name: AWS credentials (OIDC)
        if: ${{ vars.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: init + plan
        id: plan
        if: ${{ vars.AWS_ROLE_ARN != '' }}
        run: |
          set +e
          terraform -chdir=terraform/envs/${{ matrix.env }} init -input=false
          terraform -chdir=terraform/envs/${{ matrix.env }} plan -no-color -input=false | tee plan-${{ matrix.env }}.txt
          echo "exit=${PIPESTATUS[1]}" >> "$GITHUB_OUTPUT"

      - name: comment plan
        if: ${{ vars.AWS_ROLE_ARN != '' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ matrix.env }}';
            let body = '';
            try { body = fs.readFileSync(`plan-${env}.txt`, 'utf8'); } catch (e) { body = '(no plan output)'; }
            const clipped = body.length > 60000 ? body.slice(-60000) : body;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### terraform plan \`${env}\`\n<details><summary>output</summary>\n\n\`\`\`\n${clipped}\n\`\`\`\n</details>`
            });

      - name: fail on plan error
        if: ${{ vars.AWS_ROLE_ARN != '' && steps.plan.outputs.exit != '0' }}
        run: exit 1
